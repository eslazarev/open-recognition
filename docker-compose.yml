services:
  app:
    build: .
    container_name: open_recognition_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPEN_RECOGNITION_DATABASE_URL: postgresql://open_recognition:open_recognition@postgres:5432/open_recognition
    ports:
      - "8080:8080"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: open_recognition_pg
    environment:
      POSTGRES_USER: open_recognition
      POSTGRES_PASSWORD: open_recognition
      POSTGRES_DB: open_recognition
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_recognition -d open_recognition"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pg_data:
